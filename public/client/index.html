<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Umamido — Rejoindre la fidélité</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=Space+Mono:wght@700&display=swap');
  :root { --navy:#1a1e5a; --orange:#e8461e; --cream:#faf6ef; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: 'Syne', sans-serif;
  }
  .card {
    background: var(--cream);
    border-radius: 28px;
    padding: 36px 28px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 8px 10px 0px var(--orange);
  }
  .fox { font-size: 3.5rem; margin-bottom: 8px; }
  h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: 2.4rem;
    color: var(--navy);
    letter-spacing: 4px;
  }
  .subtitle {
    font-size: 0.65rem;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 700;
    margin-bottom: 28px;
  }
  .field {
    margin-bottom: 14px;
    text-align: left;
  }
  label {
    display: block;
    font-size: 0.6rem;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid rgba(26,30,90,0.15);
    border-radius: 12px;
    font-size: 0.95rem;
    font-family: 'Syne', sans-serif;
    background: white;
    color: var(--navy);
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--orange); }
  .btn {
    width: 100%;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'Bebas Neue', cursive;
    font-size: 1.2rem;
    letter-spacing: 4px;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 4px 5px 0 var(--orange);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:active { transform: translate(3px,3px); box-shadow: 1px 2px 0 var(--orange); }
  .perks {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .perk {
    background: white;
    border-radius: 12px;
    padding: 10px 14px;
    text-align: center;
    flex: 1;
  }
  .perk-icon { font-size: 1.4rem; }
  .perk-text {
    font-size: 0.55rem;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    margin-top: 4px;
  }
  .error { color: var(--orange); font-size: 0.75rem; margin-top: 8px; }
  .success { display: none; }
  .success.show { display: block; }
  .form-area.hide { display: none; }
</style>
</head>

      <div class="perk-text">Dans ton Wallet</div>
    </div>
  </div>

  <div class="form-area" id="formArea">
    <div class="field">
      <label>Ton prénom</label>
      <input type="text" id="name" placeholder="Sakura" autocomplete="given-name">
    </div>
    <div class="field">
      <label>Email ou téléphone</label>
      <input type="text" id="contact" placeholder="email@exemple.com ou 06..." autocomplete="email">
    </div>
    <button class="btn" onclick="joinProgram()">REJOINDRE →</button>
    <p class="error" id="errorMsg"></p>
  </div>

  <div class="success" id="successArea">
    <p style="font-family:'Bebas Neue';font-size:1.8rem;color:var(--navy);letter-spacing:3px;">BIENVENUE !</p>
    <p style="font-size:0.75rem;color:#666;margin:8px 0 20px;">Ta carte est prête</p>
    <a id="walletBtn" href="#" style="
      display:block;background:var(--navy);color:white;
      border-radius:14px;padding:14px;
      font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:3px;
      text-decoration:none;margin-bottom:10px;
      box-shadow:4px 5px 0 var(--orange);
    ">📲 AJOUTER À APPLE WALLET</a>
    <a id="cardBtn" href="#" style="
      display:block;background:white;color:var(--navy);
      border:2px solid var(--navy);border-radius:14px;padding:12px;
      font-family:'Bebas Neue';font-size:1rem;letter-spacing:2px;
      text-decoration:none;
    ">VOIR MA CARTE →</a>
  </div>
</div>

<script>
async function joinProgram() {
  const name = document.getElementById('name').value.trim();
  const contact = document.getElementById('contact').value.trim();
  const error = document.getElementById('errorMsg');

  if (!name) { error.textContent = 'Entre ton prénom'; return; }
  if (!contact) { error.textContent = 'Entre ton email ou téléphone'; return; }

  const isEmail = contact.includes('@');
  const body = { name };
  if (isEmail) body.email = contact;
  else body.phone = contact;

  try {
    const res = await fetch('/api/join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if (!res.ok) { error.textContent = data.error; return; }

    document.getElementById('walletBtn').href = data.walletUrl;
    document.getElementById('cardBtn').href = data.dashboardUrl;
    document.getElementById('formArea').classList.add('hide');
    document.getElementById('successArea').classList.add('show');

  } catch(e) {
    error.textContent = 'Erreur de connexion';
  }
}

// Permettre Enter
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') joinProgram();
});
</script>
</body>
</html>
